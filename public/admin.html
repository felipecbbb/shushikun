<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Sushi Kun</title>
  <link rel="icon" type="image/jpeg" href="WhatsApp Image 2026-03-18 at 14.19.03.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0F0A0C;
      --bg-card: #1A1416;
      --bg-input: #231E20;
      --red: #D42B2B;
      --red-dark: #A81E1E;
      --green: #2B8C4A;
      --cream: #F5EDE3;
      --muted: #A0948C;
      --dimmed: #5C5C5C;
      --font-display: 'Barlow Semi Condensed', sans-serif;
      --font-body: 'Source Serif 4', serif;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* --- Login Screen --- */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: var(--bg-card);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-box img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto;
    }

    .login-box h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 4px;
    }

    .login-box .sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: -12px;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 1px solid rgba(160, 148, 140, 0.2);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-input:focus { border-color: var(--red); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: var(--cream);
      border: none;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-btn:hover { background: var(--red-dark); }

    .login-error {
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    /* --- Dashboard --- */
    .dashboard { display: none; }

    .admin-header {
      background: rgba(15, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212, 43, 43, 0.1);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-title img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .admin-title span {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 2px;
    }

    .admin-title .badge {
      font-size: 10px;
      letter-spacing: 1px;
      padding: 4px 10px;
      background: var(--red);
      font-weight: 600;
    }

    .admin-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cream);
    }

    .btn-primary { background: var(--red); }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-outline { background: transparent; border: 1px solid rgba(160, 148, 140, 0.3); }
    .btn-outline:hover { border-color: var(--cream); }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--cream); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(212,43,43,0.3); }
    .btn-danger:hover { background: var(--red); color: var(--cream); }
    .btn-sm { padding: 6px 12px; font-size: 11px; }

    /* --- Content --- */
    .admin-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .stat-label {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .stat-card .stat-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 28px;
      color: var(--cream);
    }

    /* --- Dishes table --- */
    .dishes-panel {
      background: var(--bg-card);
    }

    .panel-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(160, 148, 140, 0.1);
    }

    .panel-header h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .dish-list { list-style: none; }

    .dish-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(160, 148, 140, 0.05);
      transition: background 0.2s;
    }

    .dish-item:hover { background: rgba(245, 237, 227, 0.02); }

    .dish-item .dish-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-input);
    }

    .dish-item .dish-thumb.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dimmed);
      font-size: 20px;
    }

    .dish-item .dish-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dish-item .dish-name {
      font-weight: 600;
      font-size: 16px;
    }

    .dish-item .dish-meta {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 12px;
    }

    .dish-item .dish-meta .cat-tag {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--red);
    }

    .visibility-toggle {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: var(--dimmed);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .visibility-toggle.on { background: var(--green); }

    .visibility-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.3s;
    }

    .visibility-toggle.on::after { transform: translateX(18px); }

    .dish-item .dish-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .empty-panel {
      padding: 60px 24px;
      text-align: center;
      color: var(--dimmed);
    }

    .empty-panel .kanji { font-size: 40px; opacity: 0.15; color: var(--red); display: block; }
    .empty-panel p { margin-top: 12px; font-size: 14px; }

    /* --- Modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid rgba(160, 148, 140, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid rgba(160, 148, 140, 0.15);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--red);
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-group select option {
      background: var(--bg-card);
      color: var(--cream);
    }

    .image-upload {
      border: 2px dashed rgba(160, 148, 140, 0.2);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s;
      position: relative;
    }

    .image-upload:hover { border-color: var(--red); }

    .image-upload input { display: none; }

    .image-upload .upload-text {
      font-size: 13px;
      color: var(--muted);
    }

    .image-upload .upload-text strong {
      color: var(--red);
    }

    .image-preview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: none;
      margin-top: 12px;
    }

    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid rgba(160, 148, 140, 0.1);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* --- Toast --- */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      background: var(--green);
      color: white;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 300;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--red); }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr; }
      .dish-item { flex-wrap: wrap; }
      .dish-item .dish-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <img src="WhatsApp Image 2026-03-18 at 14.19.03.jpeg" alt="Sushi Kun">
      <h1>SUSHI KUN</h1>
      <p class="sub">Panel de administracion</p>
      <input type="password" class="login-input" id="loginPassword" placeholder="Contrasena" autofocus>
      <button class="login-btn" onclick="login()">ENTRAR</button>
      <p class="login-error" id="loginError">Contrasena incorrecta</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-title">
          <img src="WhatsApp Image 2026-03-18 at 14.19.03.jpeg" alt="Sushi Kun">
          <span>SUSHI KUN</span>
          <span class="badge">ADMIN</span>
        </div>
        <div class="admin-actions">
          <a href="/carta" target="_blank" class="btn btn-outline">VER CARTA</a>
          <button class="btn btn-ghost" onclick="logout()">SALIR</button>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">PLATOS TOTALES</span>
          <span class="stat-value" id="statTotal">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">VISIBLES</span>
          <span class="stat-value" id="statVisible">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">CATEGORIAS</span>
          <span class="stat-value" id="statCategories">0</span>
        </div>
      </div>

      <div class="dishes-panel">
        <div class="panel-header">
          <h2>PLATOS</h2>
          <button class="btn btn-primary" onclick="openModal()">+ NUEVO PLATO</button>
        </div>
        <ul class="dish-list" id="dishList"></ul>
        <div class="empty-panel" id="emptyPanel" style="display:none;">
          <span class="kanji">鮨</span>
          <p>No hay platos todavia. Anade el primero.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Nuevo plato</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>NOMBRE</label>
          <input type="text" id="dishName" placeholder="Ej: Salmon Roll">
        </div>
        <div class="form-group">
          <label>DESCRIPCION</label>
          <textarea id="dishDesc" placeholder="Breve descripcion del plato..."></textarea>
        </div>
        <div class="form-group">
          <label>CATEGORIA</label>
          <select id="dishCategory">
            <option value="Sushi Rolls">Sushi Rolls</option>
            <option value="Sashimi">Sashimi</option>
            <option value="Nigiri">Nigiri</option>
            <option value="Maki">Maki</option>
            <option value="Temaki">Temaki</option>
            <option value="Ramen">Ramen</option>
            <option value="Tempura">Tempura</option>
            <option value="Entrantes">Entrantes</option>
            <option value="Postres">Postres</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Otros">Otros</option>
          </select>
        </div>
        <div class="form-group">
          <label>IMAGEN</label>
          <div class="image-upload" onclick="document.getElementById('dishImage').click()">
            <input type="file" id="dishImage" accept="image/jpeg,image/png,image/webp" onchange="previewImage(this)">
            <p class="upload-text">Click para <strong>subir imagen</strong><br>JPG, PNG o WebP (max 5MB)</p>
          </div>
          <img class="image-preview" id="imagePreview">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">CANCELAR</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveDish()">GUARDAR</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://fapciumbeoawyrkijpxe.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Wha_sWqCl-MkGllOb8VIgg_SKPzlNQr';
    const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let token = localStorage.getItem('sushikun_token') || '';
    let dishes = [];

    // --- Auth ---
    async function login() {
      const pw = document.getElementById('loginPassword').value;
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (data.success) {
          token = data.token;
          localStorage.setItem('sushikun_token', token);
          showDashboard();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      } catch {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function logout() {
      token = '';
      localStorage.removeItem('sushikun_token');
      location.reload();
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadDishes();
    }

    // --- Check stored token ---
    async function checkAuth() {
      if (!token) return;
      try {
        const res = await fetch('/api/admin/dishes', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          showDashboard();
        } else {
          localStorage.removeItem('sushikun_token');
          token = '';
        }
      } catch {
        localStorage.removeItem('sushikun_token');
        token = '';
      }
    }
    checkAuth();

    // --- Image upload to Supabase Storage ---
    async function uploadImageToStorage(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      const randomHex = Array.from(crypto.getRandomValues(new Uint8Array(4)))
        .map(b => b.toString(16).padStart(2, '0')).join('');
      const fileName = `${Date.now()}-${randomHex}.${ext}`;

      const { data, error } = await sbClient.storage
        .from('dish-images')
        .upload(fileName, file, {
          cacheControl: '3600',
          upsert: false
        });

      if (error) throw error;

      const { data: urlData } = sbClient.storage
        .from('dish-images')
        .getPublicUrl(fileName);

      return urlData.publicUrl;
    }

    // --- CRUD ---
    async function loadDishes() {
      try {
        const res = await fetch('/api/admin/dishes', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        dishes = await res.json();
        dishes.sort((a, b) => (a.order || 0) - (b.order || 0));
        renderDishes();
        updateStats();
      } catch (e) {
        showToast('Error cargando platos', true);
      }
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = dishes.length;
      document.getElementById('statVisible').textContent = dishes.filter(d => d.visible !== false).length;
      document.getElementById('statCategories').textContent = new Set(dishes.map(d => d.category).filter(Boolean)).size;
    }

    function renderDishes() {
      const list = document.getElementById('dishList');
      const empty = document.getElementById('emptyPanel');

      if (dishes.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = dishes.map(dish => `
        <li class="dish-item">
          ${dish.image
            ? `<img class="dish-thumb" src="${dish.image}" alt="${dish.name}">`
            : `<div class="dish-thumb empty">鮨</div>`}
          <div class="dish-info">
            <span class="dish-name">${dish.name}</span>
            <span class="dish-meta">
              <span class="cat-tag">${dish.category || 'SIN CATEGORIA'}</span>
              ${dish.description ? dish.description.substring(0, 60) + (dish.description.length > 60 ? '...' : '') : ''}
            </span>
          </div>
          <button class="visibility-toggle ${dish.visible !== false ? 'on' : ''}"
            onclick="toggleVisibility('${dish.id}')" title="${dish.visible !== false ? 'Visible' : 'Oculto'}"></button>
          <div class="dish-actions">
            <button class="btn btn-outline btn-sm" onclick="editDish('${dish.id}')">EDITAR</button>
            <button class="btn btn-danger btn-sm" onclick="deleteDish('${dish.id}')">ELIMINAR</button>
          </div>
        </li>
      `).join('');
    }

    // --- Modal ---
    function openModal(id) {
      document.getElementById('editId').value = '';
      document.getElementById('dishName').value = '';
      document.getElementById('dishDesc').value = '';
      document.getElementById('dishCategory').value = 'Sushi Rolls';
      document.getElementById('dishImage').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('modalTitle').textContent = 'Nuevo plato';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function editDish(id) {
      const dish = dishes.find(d => d.id === id);
      if (!dish) return;
      document.getElementById('editId').value = dish.id;
      document.getElementById('dishName').value = dish.name;
      document.getElementById('dishDesc').value = dish.description || '';
      document.getElementById('dishCategory').value = dish.category || 'Otros';
      document.getElementById('modalTitle').textContent = 'Editar plato';

      const preview = document.getElementById('imagePreview');
      if (dish.image) {
        preview.src = dish.image;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }

      document.getElementById('modalOverlay').classList.add('open');
    }

    function previewImage(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const preview = document.getElementById('imagePreview');
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    async function saveDish() {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('dishName').value.trim();
      if (!name) { showToast('El nombre es obligatorio', true); return; }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'GUARDANDO...';

      try {
        let imageUrl = null;
        const imageFile = document.getElementById('dishImage').files[0];

        if (imageFile) {
          imageUrl = await uploadImageToStorage(imageFile);
        }

        const body = {
          name,
          description: document.getElementById('dishDesc').value.trim(),
          category: document.getElementById('dishCategory').value
        };

        if (imageUrl) {
          body.image = imageUrl;
        }

        if (!id) {
          body.visible = true;
          body.order = dishes.length;
        }

        const url = id ? `/api/admin/dishes/${id}` : '/api/admin/dishes';
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          closeModal();
          loadDishes();
          showToast(id ? 'Plato actualizado' : 'Plato creado');
        } else {
          showToast('Error guardando plato', true);
        }
      } catch (err) {
        console.error(err);
        showToast('Error de conexion', true);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'GUARDAR';
      }
    }

    async function deleteDish(id) {
      const dish = dishes.find(d => d.id === id);
      if (!confirm(`Eliminar "${dish.name}"?`)) return;

      try {
        const res = await fetch(`/api/admin/dishes/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          loadDishes();
          showToast('Plato eliminado');
        }
      } catch {
        showToast('Error eliminando', true);
      }
    }

    async function toggleVisibility(id) {
      const dish = dishes.find(d => d.id === id);
      if (!dish) return;

      try {
        await fetch(`/api/admin/dishes/${id}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ visible: dish.visible === false ? true : false })
        });
        loadDishes();
      } catch {
        showToast('Error actualizando', true);
      }
    }

    // --- Toast ---
    function showToast(msg, isError) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.className = 'toast', 3000);
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
  </script>
</body>
</html>
